name: Build Flex Template

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, stage]
        default: dev
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker authentication
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet
      - name: Build and push immutable image
        env:
          IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPOSITORY }}/pipeline:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Build versioned Flex Template specification
        env:
          TEMPLATE: gs://${{ vars.PIPELINE_BUCKET }}/templates/pipeline-${{ github.sha }}.json
        run: |
          gcloud dataflow flex-template build "$TEMPLATE" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --image "$IMAGE" \
            --sdk-language PYTHON \
            --metadata-file template/metadata.json
          echo "TEMPLATE_GCS_PATH=$TEMPLATE" >> "$GITHUB_ENV"
      - name: Deploy with controlled replacement
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          JOB_NAME: portfolio-${{ inputs.environment }}-event-validation
          INPUT_SUBSCRIPTION: ${{ vars.INPUT_SUBSCRIPTION }}
          VALID_OUTPUT: gs://${{ vars.PIPELINE_BUCKET }}/output/valid
          INVALID_OUTPUT: gs://${{ vars.PIPELINE_BUCKET }}/output/invalid
          SERVICE_ACCOUNT: ${{ vars.DATAFLOW_WORKER_SERVICE_ACCOUNT }}
          SUBNETWORK: ${{ vars.DATAFLOW_SUBNETWORK }}
        run: ./scripts/deploy.sh

